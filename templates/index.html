<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Resume Matching System</title>
    <link rel="stylesheet"
          href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

    <style>
        body { background: #f4f6f9; }
        .container { margin-top: 40px; }
        .card { box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card-header {
            background: #007bff;
            color: white;
            font-size: 1.3rem;
            text-align: center;
            font-weight: 600;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="card">
        <div class="card-header">AI Resume Matching System</div>
        <div class="card-body">

            <form method="POST" action="/match" enctype="multipart/form-data">

                <div class="form-group">
                    <label>Job Description</label>
                    <textarea class="form-control" name="job_description" rows="6" required></textarea>
                </div>

                <div class="form-group">
                    <label>Upload Resumes</label>
                    <input type="file" class="form-control" name="resumes" multiple required>
                </div>

                <div class="form-group">
                    <label>Show Top Candidates</label>
                    <select class="form-control" name="top_n">
                        <option value="10">Top 10</option>
                        <option value="20">Top 20</option>
                        <option value="50">Top 50</option>
                    </select>
                </div>

                <button class="btn btn-primary btn-block">Run Resume Matching</button>
            </form>

            {% if message %}
                <div class="alert alert-info mt-4">{{ message }}</div>
            {% endif %}

            {% if results %}
            <form method="POST" action="/download_pdf">
                <h5 class="mt-4">Shortlisted Candidates (Top {{ selected_top_n }})</h5>

                <table class="table table-bordered mt-2">
                    <thead class="thead-dark">
                        <tr>
                            <th>Select</th>
                            <th>Candidate Name</th>
                            <th>ATS Score</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for r in results %}
                        <tr>
                            <td>
                                <!-- ✅ UPDATED CHECKBOX VALUE -->
                                <input type="checkbox" name="shortlisted"
                                       value="{{ r.name }}||{{ r.email }}">
                            </td>
                            <td>{{ r.name }}</td>
                            <td>{{ r.score }}</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>

                <button class="btn btn-success">
                    Download Shortlist PDF
                </button>
            </form>
            {% endif %}

        </div>
    </div>
</div>

</body>
</html>
